# Dependabot — free automated dependency vulnerability updates.
# SECURITY_CHECKLIST A.8.8 (management of technical vulnerabilities).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
