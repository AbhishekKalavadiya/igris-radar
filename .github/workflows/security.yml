# Free application-security CI (SECURITY_CHECKLIST §"Recommended Security Tooling").
# All tools used here are free for public repos / open source:
#   - npm audit    : known-CVE dependency scanning
#   - Semgrep      : SAST (injection, secrets, insecure patterns)
#   - Gitleaks     : hardcoded-secret detection
#   - CodeQL       : GitHub's SAST engine (free for public repos)
name: security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Report high+ severity advisories. Does not fail the build on transitive
      # issues you can't immediately fix; tighten to `--audit-level=high` + no
      # `|| true` once the tree is clean.
      - run: yarn install --frozen-lockfile || yarn install
      - run: yarn npm audit --severity high || npm audit --audit-level=high || true

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci
        env:
          SEMGREP_RULES: "p/javascript p/nextjs p/react p/secrets p/owasp-top-ten"

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
